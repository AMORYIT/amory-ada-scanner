name: Weekly ADA Accessibility Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run accessibility scan
        run: npm run scan
